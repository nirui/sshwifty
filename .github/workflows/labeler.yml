name: 'Pull Request Labeler'
on:
  pull_request_target:

jobs:
  labeler:
    name: Pull Request Labeler
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Pull Request Labeler
        uses: srvaroa/labeler@v1
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
